<nav class="navbar navbar-expand-lg navbar-dark custom-navbar py-3">
  <div class="container">
    <a class="navbar-brand fw-bold d-flex align-items-center" routerLink="/">
      <i class="bi bi-braces-asterisk fs-4 me-2" style="color: #818cf8;"></i>
      <span class="gradient-text fs-4">AngularForms</span>
    </a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
      aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <i class="bi bi-list text-light fs-3"></i>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <ul class="navbar-nav gap-1 mt-2 mt-lg-0">
        @if (!authService.isLoggedIn()) {
        <li class="nav-item">
          <a class="nav-link px-3 py-2 rounded" routerLink="/register" routerLinkActive="active"
            [routerLinkActiveOptions]="{exact: true}">
            <i class="bi bi-person-plus me-1"></i> Register (Reactive)
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link px-3 py-2 rounded" routerLink="/login" routerLinkActive="active">
            <i class="bi bi-box-arrow-in-right me-1"></i> Login (Template)
          </a>
        </li>
        } @else {
        <li class="nav-item">
          <a class="nav-link px-3 py-2 rounded" routerLink="/home" routerLinkActive="active">
            <i class="bi bi-house me-1"></i> Home
          </a>
        </li>
        <li class="nav-item">
          <button class="nav-link px-3 py-2 rounded text-danger border-0 bg-transparent w-100 text-start" (click)="logout()">
            <i class="bi bi-box-arrow-left me-1"></i> Logout
          </button>
        </li>
        }
      </ul>
    </div>
  </div>

<main class="grow d-flex align-items-center">
